<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать модуль - Cramly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background-color: #ffffff;
            color: #000000;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background-color: #f5f5f5;
            border-radius: 50%;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nav-buttons {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            font-family: 'Comfortaa', cursive;
            font-size: 16px;
            cursor: pointer;
            color: #000000;
            text-decoration: none;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        .page-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        .page-subtitle {
            font-size: 16px;
            font-weight: 400;
            color: #666666;
            margin-bottom: 50px;
            text-align: center;
        }

        .form-section {
            background-color: #f8f8f8;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #000000;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Comfortaa', cursive;
            font-size: 15px;
            transition: border-color 0.3s;
            background-color: #ffffff;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: #000000;
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .cards-section {
            margin-top: 40px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .card-item {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-number {
            font-size: 18px;
            font-weight: 700;
            color: #666666;
        }

        .delete-card-btn {
            background-color: #ff4444;
            color: #ffffff;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-family: 'Comfortaa', cursive;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .delete-card-btn:hover {
            background-color: #cc0000;
        }

        .add-card-btn {
            width: 100%;
            background-color: #4a4a4a;
            color: #ffffff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Comfortaa', cursive;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 20px;
        }

        .add-card-btn:hover {
            background-color: #333333;
            transform: translateY(-2px);
        }

        .submit-section {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        .submit-btn,
        .cancel-btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-family: 'Comfortaa', cursive;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn {
            background-color: #000000;
            color: #ffffff;
        }

        .submit-btn:hover {
            background-color: #333333;
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            background-color: #999999;
            cursor: not-allowed;
            transform: none;
        }

        .cancel-btn {
            background-color: #e0e0e0;
            color: #000000;
        }

        .cancel-btn:hover {
            background-color: #cccccc;
        }

        /* Плавающий тост — position: fixed, поэтому виден всегда,
           независимо от того, насколько прокручена страница. */
        .status-message {
            display: none;
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            z-index: 1000;
            min-width: 280px;
            max-width: 90%;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            text-align: center;
        }

        .status-message.show {
            display: block;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .status-message.error {
            background-color: #fdecea;
            color: #d32f2f;
            border: 2px solid #f5c6cb;
        }

        .status-message.success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #c8e6c9;
        }

        footer {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .footer-left {
            font-size: 14px;
            color: #666666;
            max-width: 200px;
            line-height: 1.6;
        }

        .footer-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .footer-logo {
            width: 60px;
            height: 60px;
            background-color: #f5f5f5;
            border-radius: 50%;
        }

        .footer-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .footer-text {
            font-size: 13px;
            color: #999999;
            text-align: center;
            max-width: 180px;
            line-height: 1.5;
        }

        .footer-right {
            font-size: 14px;
            color: #999999;
        }

        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            .logo {
                width: 60px;
                height: 60px;
            }

            .nav-buttons {
                gap: 20px;
            }

            .nav-btn {
                font-size: 14px;
            }

            main {
                padding: 40px 20px;
            }

            .page-title {
                font-size: 32px;
            }

            .page-subtitle {
                font-size: 14px;
                margin-bottom: 30px;
            }

            .form-section {
                padding: 25px 20px;
            }

            .card-item {
                padding: 20px 15px;
            }

            .submit-section {
                flex-direction: column;
            }

            footer {
                flex-direction: column;
                align-items: center;
                gap: 30px;
                text-align: center;
                margin: 60px auto 30px;
                padding: 0 20px;
            }

            .footer-left,
            .footer-text {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .page-title {
                font-size: 28px;
            }

            .status-message {
                top: 15px;
                min-width: unset;
                width: calc(100% - 30px);
            }
        }
    </style>
</head>
<body>
<header>
    <div class="logo-section">
        <div class="logo">
            <img src="/images/BOB.png" alt="Cramly Logo">
        </div>
    </div>
    <div class="nav-buttons">
        <a href="/home" class="nav-btn">Мои модули</a>
        <a href="/profile" class="nav-btn">Профиль</a>
    </div>
</header>

<main>
    <h1 class="page-title">Режим редактирования</h1>
    <p class="page-subtitle">Заполните информацию о модуле и добавьте карточки для изучения</p>

    <!-- Обычный <form> больше не отправляет данные сам — этим занимается JS ниже -->
    <form id="module-form">

        <!-- Плавающий тост: рендерится в потоке, но благодаря position: fixed
             в CSS всегда прилеплен к вьюпорту и виден при любом скролле. -->
        <div id="status-message" class="status-message"></div>

        <!-- Скрытое поле с id модуля — нужно для режима редактирования.
             Значение сюда пока подставляет Thymeleaf при отдаче страницы. -->
        <input type="hidden" id="module-id" th:value="${module.id}">

        <div class="form-section">
            <div class="form-group">
                <label class="form-label" for="name">Название модуля *</label>
                <input
                        type="text"
                        id="name"
                        th:value="${module.name}"
                        class="form-input"
                        placeholder="Введите название модуля"
                        required>
            </div>

            <div class="form-group">
                <label class="form-label" for="description">Описание</label>
                <textarea
                        id="description"
                        class="form-textarea"
                        placeholder="Краткое описание модуля (необязательно)"
                        th:text="${module.description}"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label" for="status">Статус модуля *</label>
                <select id="status" class="form-select" required>
                    <option value="PUBLIC" th:selected="${module.status != null and module.status.name() == 'PUBLIC'}">Публичный (доступен всем)</option>
                    <option value="PRIVATE" th:selected="${module.status != null and module.status.name() == 'PRIVATE'}">Приватный (только для вас)</option>
                </select>
            </div>
        </div>

        <div class="cards-section">
            <h2 class="section-title">Карточки для изучения</h2>

            <div id="cards-container">
                <!-- th:data-original-theme / th:data-original-text хранят исходные значения карточки
                     с сервера. JS сравнивает с ними текущие значения при сабмите, чтобы понять,
                     редактировалась ли карточка, и проставить cardStatus = 'EDITED'.
                     Если этих атрибутов нет вообще (карточка добавлена через "+ Добавить карточку"),
                     она считается новой и тоже помечается EDITED. -->
                <div class="card-item"
                     th:each="card, iterStat : ${module.cardList}"
                     th:data-original-theme="${card.theme}"
                     th:data-original-text="${card.text}">
                    <div class="card-header">
                        <span class="card-number" th:text="'Карточка #' + ${iterStat.index + 1}">Карточка #1</span>
                        <button type="button" class="delete-card-btn"
                                onclick="deleteCard(this)"
                                th:style="${iterStat.index == 0 && iterStat.size == 1} ? 'display:none' : ''">
                            Удалить
                        </button>
                    </div>

                    <!-- data-id хранит id карточки, если она уже существует в базе.
                         Для новых карточек этого атрибута просто не будет — и это нормально,
                         на бэке ты поймёшь, что это "новая карточка", если id == null -->
                    <div class="form-group" th:data-id="${card.id}">
                        <label class="form-label">Термин / Вопрос *</label>
                        <input
                                type="text"
                                class="form-input card-theme"
                                th:value="${card.theme}"
                                placeholder="Например: Что такое переменная?"
                                required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Определение / Ответ *</label>
                        <textarea
                                class="form-textarea card-text"
                                placeholder="Например: Переменная — это именованная область памяти..."
                                required
                                th:text="${card.text}"></textarea>
                    </div>
                </div>
            </div>

            <button type="button" class="add-card-btn" onclick="addCard()">+ Добавить карточку</button>
        </div>

        <div class="submit-section">
            <button type="button" class="cancel-btn" onclick="window.location.href='/home'">Отмена</button>
            <button type="submit" class="submit-btn" id="submit-btn">Готово</button>
        </div>
    </form>
</main>

<footer>
    <div class="footer-left">
        Жоска лагает и ничего не работает? Настучать по голове разрабу "тык".
    </div>
    <div class="footer-center">
        <div class="footer-logo">
            <img src="/images/BOB.png" alt="Cramly Logo">
        </div>
        <p class="footer-text">Ничьи права не защищены. У вас нет прав.</p>
    </div>
    <div class="footer-right">
        -spaceee<br>2025<br>❤️
    </div>
</footer>

<script>
    /* ============================================================
       Добавление / удаление карточек на странице.
       Это чисто визуальная логика, она не влияет на JSON, который
       мы отправим на сервер — тот собирается отдельно, в момент сабмита.
       ============================================================ */

    function addCard() {
        const container = document.getElementById('cards-container');
        const newCard = document.createElement('div');
        newCard.className = 'card-item';
        // У новой карточки нет data-original-theme/text — значит при сабмите
        // она будет автоматически помечена как cardStatus = 'EDITED'.
        newCard.innerHTML = `
            <div class="card-header">
                <span class="card-number"></span>
                <button type="button" class="delete-card-btn" onclick="deleteCard(this)">Удалить</button>
            </div>
            <div class="form-group">
                <label class="form-label">Термин / Вопрос *</label>
                <input type="text" class="form-input card-theme" placeholder="Введите термин или вопрос" required>
            </div>
            <div class="form-group">
                <label class="form-label">Определение / Ответ *</label>
                <textarea class="form-textarea card-text" placeholder="Введите определение или ответ" required></textarea>
            </div>
        `;
        container.appendChild(newCard);
        updateCardNumbers();
    }

    function deleteCard(button) {
        button.closest('.card-item').remove();
        updateCardNumbers();
    }

    function updateCardNumbers() {
        const cards = document.querySelectorAll('.card-item');
        cards.forEach((card, index) => {
            card.querySelector('.card-number').textContent = `Карточка #${index + 1}`;
            const deleteBtn = card.querySelector('.delete-card-btn');
            deleteBtn.style.display = (index === 0 && cards.length === 1) ? 'none' : 'block';
        });
    }

    /* ============================================================
       Главная часть: сборка JSON и отправка на сервер.
       ============================================================ */

    const form = document.getElementById('module-form');
    const submitBtn = document.getElementById('submit-btn');
    const statusMessage = document.getElementById('status-message');

    // Показывает плавающий тост с сообщением об успехе/ошибке.
    // Виден всегда, независимо от прокрутки, т.к. .status-message
    // имеет position: fixed. Автоматически скрывается через 4 секунды.
    function showToast(type, message) {
        statusMessage.textContent = message;
        statusMessage.className = `status-message ${type} show`;

        clearTimeout(showToast._timer);
        showToast._timer = setTimeout(() => {
            statusMessage.classList.remove('show');
        }, 4000);
    }

    form.addEventListener('submit', async function (event) {
        // Отменяем стандартное поведение формы (перезагрузку страницы)
        event.preventDefault();

        // Прячем предыдущий тост, если он был показан
        statusMessage.className = 'status-message';
        statusMessage.textContent = '';

        // 1. Собираем данные карточек в массив объектов
        const cardElements = document.querySelectorAll('.card-item');
        const cards = Array.from(cardElements).map(cardEl => {
            const idHolder = cardEl.querySelector('.form-group[data-id]');
            const id = idHolder ? idHolder.getAttribute('data-id') : null;

            const theme = cardEl.querySelector('.card-theme').value.trim();
            const text = cardEl.querySelector('.card-text').value.trim();

            // Если data-original-* атрибутов нет — карточка новая (добавлена через addCard),
            // и она сразу считается EDITED. Если атрибуты есть — сравниваем с исходными
            // значениями, и EDITED ставится только при реальном изменении содержимого.
            const hasOriginal = cardEl.dataset.originalTheme !== undefined
                || cardEl.dataset.originalText !== undefined;

            let cardStatus = null;

            if (!hasOriginal) {
                cardStatus = 'EDITED';
            } else {
                const originalTheme = cardEl.dataset.originalTheme ?? '';
                const originalText = cardEl.dataset.originalText ?? '';

                if (theme !== originalTheme || text !== originalText) {
                    cardStatus = 'EDITED';
                }
            }

            return {
                id: id ? Number(id) : null,
                theme: theme,
                text: text,
                cardStatus: cardStatus
            };
        });

        // 2. Собираем весь объект-модуль — это и есть тот JSON,
        //    который на бэке ляжет в твой ModuleDto
        const moduleDto = {
            id: document.getElementById('module-id').value ? Number(document.getElementById('module-id').value) : null,
            name: document.getElementById('name').value.trim(),
            description: document.getElementById('description').value.trim(),
            status: document.getElementById('status').value,
            cards: cards
        };

        // 3. Отправляем на сервер
        submitBtn.disabled = true;
        submitBtn.textContent = 'Сохраняем...';

        try {
            const response = await fetch('/api/modules/edit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(moduleDto)
            });

            if (response.ok) {
                showToast('success', 'Модуль успешно сохранён!');
                // например, можно сразу перекинуть на главную:
                // window.location.href = '/home';
            } else {
                // Пока без разбора конкретных полей — просто общее сообщение
                showToast('error', 'Не удалось сохранить модуль. Проверьте введённые данные.');
            }
        } catch (err) {
            console.error('Ошибка сети:', err);
            showToast('error', 'Ошибка соединения с сервером. Попробуйте ещё раз.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Готово';
        }
    });
</script>
</body>
</html>
