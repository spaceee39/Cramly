<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Cramly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background-color: #ffffff;
            color: #000000;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background-color: #f5f5f5;
            border-radius: 50%;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-text {
            font-size: 42px;
            font-weight: 400;
            color: #000000;
        }

        .nav-buttons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            font-family: 'Comfortaa', cursive;
            font-size: 16px;
            cursor: pointer;
            color: #000000;
            text-decoration: none;
            display: inline-block;
        }

        .logout-btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-family: 'Comfortaa', cursive;
            font-size: 16px;
            cursor: pointer;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 50px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background-color: #f5f5f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: #666666;
        }

        .profile-info h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .profile-stats {
            display: flex;
            gap: 30px;
            font-size: 16px;
            color: #666666;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-number {
            font-weight: 700;
            color: #000000;
        }

        .section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .module-card {
            background-color: #f5f5f5;
            padding: 25px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #000000;
        }

        .module-card:hover {
            background-color: #ebebeb;
            transform: translateY(-2px);
        }

        .module-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .module-stats {
            font-size: 14px;
            color: #666666;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background-color: #f5f5f5;
            border-radius: 12px;
        }

        .empty-state-text {
            font-size: 18px;
            color: #666666;
            margin-bottom: 20px;
        }

        .create-module-btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 15px 35px;
            border-radius: 8px;
            font-family: 'Comfortaa', cursive;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .roles-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .role-badge {
            background-color: #000000;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        footer {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .footer-left {
            font-size: 14px;
            color: #666666;
            max-width: 200px;
            line-height: 1.6;
        }

        .footer-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .footer-logo {
            width: 60px;
            height: 60px;
            background-color: #f5f5f5;
            border-radius: 50%;
        }

        .footer-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .footer-text {
            font-size: 13px;
            color: #999999;
            text-align: center;
            max-width: 180px;
            line-height: 1.5;
        }

        .footer-right {
            font-size: 14px;
            color: #999999;
        }

        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
                flex-wrap: wrap;
            }

            .logo {
                width: 60px;
                height: 60px;
            }

            .logo-text {
                font-size: 32px;
            }

            .nav-buttons {
                gap: 15px;
                width: 100%;
                justify-content: flex-end;
                margin-top: 15px;
            }

            .nav-btn,
            .logout-btn {
                font-size: 14px;
            }

            .logout-btn {
                padding: 10px 20px;
            }

            main {
                padding: 40px 20px;
            }

            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 20px;
            }

            .profile-avatar {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }

            .profile-info h1 {
                font-size: 32px;
            }

            .profile-stats {
                flex-direction: column;
                gap: 10px;
            }

            .section-title {
                font-size: 24px;
            }

            .modules-grid {
                grid-template-columns: 1fr;
            }

            footer {
                flex-direction: column;
                align-items: center;
                gap: 30px;
                text-align: center;
                margin: 60px auto 30px;
                padding: 0 20px;
            }

            .footer-left,
            .footer-text {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .profile-info h1 {
                font-size: 28px;
            }

            .logo-text {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="logo-section">
        <div class="logo">
            <img src="/images/BOB.png" alt="Cramly Logo">
        </div>
        <div class="logo-text">Cramly</div>
    </div>
    <div class="nav-buttons">
        <a href="/home" class="nav-btn">Главная</a>
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="logout-btn">Выйти из аккаунта</button>
        </form>
    </div>
</header>

<main>
    <div class="profile-header">
        <div class="profile-avatar" th:text="${user.username.substring(0, 1).toUpperCase()}">
            U
        </div>
        <div class="profile-info">
            <h1 th:text="${user.username}">Имя пользователя</h1>
            <div class="profile-stats">
                <div class="stat-item">
                    <span class="stat-number" th:text="${user.modules.size()}">0</span>
                    <span>модулей</span>
                </div>
                <div class="stat-item">
                    <span>ID:</span>
                    <span class="stat-number" th:text="${user.id}">1</span>
                </div>
            </div>
        </div>
    </div>

    <section class="section" th:if="${user.roles != null && !user.roles.isEmpty()}">
        <h2 class="section-title">Роли</h2>
        <div class="roles-list">
            <span class="role-badge" th:each="role : ${user.roles}" th:text="${role.name}">USER</span>
        </div>
    </section>

    <section class="section">
        <h2 class="section-title">Мои модули</h2>
        <div class="modules-grid" th:if="${user.modules != null && !user.modules.isEmpty()}">
            <a th:each="module : ${user.modules}"
               th:href="@{/module/{id}(id=${module.id})}"
               class="module-card">
                <div class="module-name" th:text="${module.name}">Название модуля</div>
                <div class="module-stats">
                    <span th:if="${module.getCardList != null}">
                        Карточек: <span th:text="${module.getCardCount()}">0</span>
                    </span>
                </div>
            </a>
        </div>
        <div class="empty-state" th:if="${user.modules == null || user.modules.isEmpty()}">
            <p class="empty-state-text">У вас пока нет модулей</p>
            <a href="/create-module" class="create-module-btn">Создать первый модуль</a>
        </div>
    </section>
</main>

<footer>
    <div class="footer-left">
        Жоска лагает и ничего не работает? Настучать по голове разрабу "тык".
    </div>
    <div class="footer-center">
        <div class="footer-logo">
            <img src="/images/BOB.png" alt="Cramly Logo">
        </div>
        <p class="footer-text">Ничьи права не защищены. У вас нет прав.</p>
    </div>
    <div class="footer-right">
        -spaceee<br>2025<br>❤️
    </div>
</footer>
</body>
</html>
