<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать модуль - Cramly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background-color: #ffffff;
            color: #000000;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background-color: #f5f5f5;
            border-radius: 50%;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-text {
            font-size: 42px;
            font-weight: 400;
            color: #000000;
        }

        .nav-buttons {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            font-family: 'Comfortaa', cursive;
            font-size: 16px;
            cursor: pointer;
            color: #000000;
            text-decoration: none;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        .page-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        .page-subtitle {
            font-size: 16px;
            font-weight: 400;
            color: #666666;
            margin-bottom: 50px;
            text-align: center;
        }

        .form-section {
            background-color: #f8f8f8;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #000000;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Comfortaa', cursive;
            font-size: 15px;
            transition: border-color 0.3s;
            background-color: #ffffff;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: #000000;
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .error-message {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 5px;
        }

        .cards-section {
            margin-top: 40px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .card-item {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-number {
            font-size: 18px;
            font-weight: 700;
            color: #666666;
        }

        .delete-card-btn {
            background-color: #ff4444;
            color: #ffffff;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-family: 'Comfortaa', cursive;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .delete-card-btn:hover {
            background-color: #cc0000;
        }

        .add-card-btn {
            width: 100%;
            background-color: #4a4a4a;
            color: #ffffff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Comfortaa', cursive;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 20px;
        }

        .add-card-btn:hover {
            background-color: #333333;
            transform: translateY(-2px);
        }

        .submit-section {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        .submit-btn,
        .cancel-btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-family: 'Comfortaa', cursive;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn {
            background-color: #000000;
            color: #ffffff;
        }

        .submit-btn:hover {
            background-color: #333333;
            transform: translateY(-2px);
        }

        .cancel-btn {
            background-color: #e0e0e0;
            color: #000000;
        }

        .cancel-btn:hover {
            background-color: #cccccc;
        }

        footer {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .footer-left {
            font-size: 14px;
            color: #666666;
            max-width: 200px;
            line-height: 1.6;
        }

        .footer-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .footer-logo {
            width: 60px;
            height: 60px;
            background-color: #f5f5f5;
            border-radius: 50%;
        }

        .footer-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .footer-text {
            font-size: 13px;
            color: #999999;
            text-align: center;
            max-width: 180px;
            line-height: 1.5;
        }

        .footer-right {
            font-size: 14px;
            color: #999999;
        }

        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            .logo {
                width: 60px;
                height: 60px;
            }

            .logo-text {
                font-size: 32px;
            }

            .nav-buttons {
                gap: 20px;
            }

            .nav-btn {
                font-size: 14px;
            }

            main {
                padding: 40px 20px;
            }

            .page-title {
                font-size: 32px;
            }

            .page-subtitle {
                font-size: 14px;
                margin-bottom: 30px;
            }

            .form-section {
                padding: 25px 20px;
            }

            .card-item {
                padding: 20px 15px;
            }

            .submit-section {
                flex-direction: column;
            }

            footer {
                flex-direction: column;
                align-items: center;
                gap: 30px;
                text-align: center;
                margin: 60px auto 30px;
                padding: 0 20px;
            }

            .footer-left,
            .footer-text {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .page-title {
                font-size: 28px;
            }

            .logo-text {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="logo-section">
        <div class="logo">
            <img src="/images/BOB.png" alt="Cramly Logo">
        </div>
        <div class="logo-text">Cramly</div>
    </div>
    <div class="nav-buttons">
        <a href="/home" class="nav-btn">Мои модули</a>
        <a href="/profile" class="nav-btn">Профиль</a>
    </div>
</header>

<main>
    <h1 class="page-title">Создать новый модуль</h1>
    <p class="page-subtitle">Заполните информацию о модуле и добавьте карточки для изучения</p>

    <form th:action="@{/create-module}" th:object="${module}" method="post">
        <div class="form-section">
            <div class="form-group">
                <label class="form-label" for="name">Название модуля *</label>
                <input
                        type="text"
                        id="name"
                        th:field="*{name}"
                        class="form-input"
                        placeholder="Введите название модуля"
                        required>
                <div class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="description">Описание</label>
                <textarea
                        id="description"
                        th:field="*{description}"
                        class="form-textarea"
                        placeholder="Краткое описание модуля (необязательно)"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label" for="status">Статус модуля *</label>
                <select id="status" th:field="*{status}" class="form-select" required>
                    <option value="PRIVATE">Выберите статус</option>
                    <option value="PUBLIC">Публичный (доступен всем)</option>
                    <option value="PRIVATE">Приватный (только для вас)</option>
                </select>
            </div>
        </div>

        <div class="cards-section">
            <h2 class="section-title">Карточки для изучения</h2>

            <div id="cards-container">
                <!-- Карточка 1 (по умолчанию) -->
                <div class="card-item">
                    <div class="card-header">
                        <span class="card-number">Карточка #1</span>
                        <button type="button" class="delete-card-btn" onclick="deleteCard(this)" style="display: none;">Удалить</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Термин / Вопрос *</label>
                        <input
                                type="text"
                                name="cards[0].theme"
                                class="form-input"
                                placeholder="Например: Что такое переменная?"
                                required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Определение / Ответ *</label>
                        <textarea
                                name="cards[0].text"
                                class="form-textarea"
                                placeholder="Например: Переменная — это именованная область памяти..."
                                required></textarea>
                    </div>
                </div>

                <!-- Карточка 2 (по умолчанию) -->
                <div class="card-item">
                    <div class="card-header">
                        <span class="card-number">Карточка #2</span>
                        <button type="button" class="delete-card-btn" onclick="deleteCard(this)">Удалить</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Термин / Вопрос *</label>
                        <input
                                type="text"
                                name="cards[1].theme"
                                class="form-input"
                                placeholder="Например: Что такое функция?"
                                required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Определение / Ответ *</label>
                        <textarea
                                name="cards[1].text"
                                class="form-textarea"
                                placeholder="Например: Функция — это блок кода..."
                                required></textarea>
                    </div>
                </div>
            </div>

            <button type="button" class="add-card-btn" onclick="addCard()">+ Добавить карточку</button>
        </div>

        <div class="submit-section">
            <button type="button" class="cancel-btn" onclick="window.location.href='/home'">Отмена</button>
            <button type="submit" class="submit-btn">Создать модуль</button>
        </div>
    </form>
</main>

<footer>
    <div class="footer-left">
        Жоска лагает и ничего не работает? Настучать по голове разрабу "тык".
    </div>
    <div class="footer-center">
        <div class="footer-logo">
            <img src="/images/BOB.png" alt="Cramly Logo">
        </div>
        <p class="footer-text">Ничьи права не защищены. У вас нет прав.</p>
    </div>
    <div class="footer-right">
        -spaceee<br>2025<br>❤️
    </div>
</footer>

<script>
    let cardCount = 2;

    function addCard() {
        const container = document.getElementById('cards-container');
        const newCard = document.createElement('div');
        newCard.className = 'card-item';
        newCard.innerHTML = `
            <div class="card-header">
                <span class="card-number">Карточка #${cardCount + 1}</span>
                <button type="button" class="delete-card-btn" onclick="deleteCard(this)">Удалить</button>
            </div>
            <div class="form-group">
                <label class="form-label">Термин / Вопрос *</label>
                <input
                    type="text"
                    name="cards[${cardCount}].theme"
                    class="form-input"
                    placeholder="Введите термин или вопрос"
                    required>
            </div>
            <div class="form-group">
                <label class="form-label">Определение / Ответ *</label>
                <textarea
                    name="cards[${cardCount}].text"
                    class="form-textarea"
                    placeholder="Введите определение или ответ"
                    required></textarea>
            </div>
        `;
        container.appendChild(newCard);
        cardCount++;
        updateCardNumbers();
    }

    function deleteCard(button) {
        const cardItem = button.closest('.card-item');
        cardItem.remove();
        updateCardNumbers();
    }

    function updateCardNumbers() {
        const cards = document.querySelectorAll('.card-item');
        cards.forEach((card, index) => {
            const cardNumber = card.querySelector('.card-number');
            cardNumber.textContent = `Карточка #${index + 1}`;

            const themeInput = card.querySelector('input[name*="theme"]');
            const textTextarea = card.querySelector('textarea[name*="text"]');

            themeInput.name = `cards[${index}].theme`;
            textTextarea.name = `cards[${index}].text`;

            const deleteBtn = card.querySelector('.delete-card-btn');
            if (index === 0 && cards.length === 1) {
                deleteBtn.style.display = 'none';
            } else {
                deleteBtn.style.display = 'block';
            }
        });
        cardCount = cards.length;
    }
</script>
</body>
</html>
