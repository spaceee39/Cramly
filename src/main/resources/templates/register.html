<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Cramly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background-color: #ffffff;
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .logo {
            width: 80px;
            height: 80px;
            background-color: #f5f5f5;
            border-radius: 50%;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-text {
            font-size: 42px;
            font-weight: 400;
            color: #000000;
        }

        .back-btn {
            background: none;
            border: none;
            font-family: 'Comfortaa', cursive;
            font-size: 16px;
            cursor: pointer;
            color: #000000;
            text-decoration: none;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
        }

        .register-container {
            width: 100%;
            max-width: 500px;
        }

        .register-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        .register-subtitle {
            font-size: 16px;
            font-weight: 400;
            color: #666666;
            margin-bottom: 40px;
            text-align: center;
        }

        .register-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 16px;
            font-weight: 500;
            color: #000000;
        }

        .form-input {
            font-family: 'Comfortaa', cursive;
            font-size: 16px;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background-color: #ffffff;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #000000;
        }

        .form-input.error {
            border-color: #660000;
        }

        .error-message {
            font-size: 13px;
            color: #660000;
            margin-top: -15px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .password-requirements {
            font-size: 13px;
            color: #999999;
            margin-top: -18px;
            margin-bottom: 3px;
        }

        .submit-btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 18px 40px;
            border-radius: 8px;
            font-family: 'Comfortaa', cursive;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #333333;
        }

        .submit-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 15px;
            color: #666666;
        }

        .login-link a {
            color: #000000;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .login-link a:hover {
            opacity: 0.7;
        }

        footer {
            max-width: 1200px;
            margin: 40px auto 40px;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
        }

        .footer-left {
            font-size: 14px;
            color: #666666;
            max-width: 200px;
            line-height: 1.6;
        }

        .footer-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .footer-logo {
            width: 60px;
            height: 60px;
            background-color: #f5f5f5;
            border-radius: 50%;
        }

        .footer-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .footer-text {
            font-size: 13px;
            color: #999999;
            text-align: center;
            max-width: 180px;
            line-height: 1.5;
        }

        .footer-right {
            font-size: 14px;
            color: #999999;
        }

        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            .logo {
                width: 60px;
                height: 60px;
            }

            .logo-text {
                font-size: 32px;
            }

            .back-btn {
                font-size: 14px;
            }

            main {
                padding: 40px 20px;
            }

            .register-title {
                font-size: 36px;
                margin-bottom: 12px;
            }

            .register-subtitle {
                font-size: 14px;
                margin-bottom: 30px;
            }

            .form-label {
                font-size: 14px;
            }

            .form-input {
                font-size: 14px;
                padding: 12px 16px;
            }

            .submit-btn {
                padding: 15px 30px;
                font-size: 16px;
            }

            footer {
                flex-direction: column;
                align-items: center;
                gap: 30px;
                text-align: center;
                margin: 30px auto 30px;
                padding: 0 20px;
            }

            .footer-left,
            .footer-text {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .register-title {
                font-size: 28px;
            }

            .logo-text {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
<header>
    <a href="/" class="logo-section">
        <div class="logo">
            <img src="images/BOB.png" alt="Cramly Logo">
        </div>
        <div class="logo-text">Cramly</div>
    </a>
    <a href="/" class="back-btn">← Назад</a>
</header>

<main>
    <div class="register-container">
        <h1 class="register-title">Регистрация</h1>
        <p class="register-subtitle">Создайте аккаунт и начните учиться эффективно!</p>

        <form class="register-form" id="registerForm" th:action="@{/register}" th:object="${user}" method="POST">
            <div class="form-group">
                <label class="form-label" for="username">Имя пользователя (Ваш логин)</label>
                <input
                        type="text"
                        id="username"
                        th:field="*{username}"
                        th:classappend="${usernameError != null or #fields.hasErrors('username')} ? 'error' : ''"
                        class="form-input"
                        placeholder="Введите имя пользователя"
                        minlength="5"
                        required
                >
                <!-- Ошибка от сервера (например, "пользователь уже существует") -->
                <div class="error-message visible" th:if="${error}" th:text="${error}"></div>
                <!-- Ошибка валидации (@NotBlank, @Size) -->
                <div class="error-message visible" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Пароль</label>
                <input
                        type="password"
                        id="password"
                        th:field="*{password}"
                        th:classappend="${passwordError != null or #fields.hasErrors('password')} ? 'error' : ''"
                        class="form-input"
                        placeholder="Введите пароль"
                        minlength="5"
                        required
                >
                <br>
                <div class="password-requirements">Минимум 5 символов</div>
                <!-- Ошибка от сервера (например, "пароли не совпадают") -->
                <div class="error-message visible" th:if="${passwordError}" th:text="${passwordError}"></div>
                <!-- Ошибка валидации (@NotBlank, @Size) -->
                <div class="error-message visible" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmpassword">Подтверждение пароля</label>
                <input
                        type="password"
                        id="confirmpassword"
                        th:field="*{confirmpassword}"
                        th:classappend="${confirmPasswordError != null} ? 'error' : ''"
                        class="form-input"
                        placeholder="Повторите пароль"
                        required
                >
                <!-- Ошибка от сервера (пароли не совпадают) -->
                <div class="error-message visible" th:if="${confirmPasswordError}" th:text="${confirmPasswordError}"></div>
                <!-- Ошибка от JavaScript валидации -->
                <div class="error-message" id="confirmPasswordError">Пароли не совпадают</div>
            </div>

            <button type="submit" class="submit-btn">Зарегистрироваться</button>

            <div class="login-link">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </div>
        </form>
    </div>
</main>

<footer>
    <div class="footer-left">
        Жоска лагает и ничего не работает? Настучать по голове разрабу "тык".
    </div>
    <div class="footer-center">
        <div class="footer-logo">
            <img src="images/BOB.png" alt="Cramly Logo">
        </div>
        <p class="footer-text">Ничьи права не защищены. У вас нет прав.</p>
    </div>
    <div class="footer-right">
        -spaceee<br>2025<br>❤️
    </div>
</footer>

<script>
    const form = document.getElementById('registerForm');
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmpassword');

    const usernameError = document.getElementById('usernameError');
    const passwordError = document.getElementById('passwordError');
    const confirmPasswordError = document.getElementById('confirmPasswordError');

    // Валидация имени пользователя
    username.addEventListener('blur', function() {
        if (this.value.length < 5 && this.value.length > 0) {
            this.classList.add('error');
            usernameError.classList.add('visible');
        } else {
            this.classList.remove('error');
            usernameError.classList.remove('visible');
        }
    });

    // Валидация пароля
    password.addEventListener('blur', function() {
        if (this.value.length < 5 && this.value.length > 0) {
            this.classList.add('error');
            passwordError.classList.add('visible');
        } else {
            this.classList.remove('error');
            passwordError.classList.remove('visible');
        }
    });

    // Валидация подтверждения пароля
    confirmPassword.addEventListener('blur', function() {
        if (this.value !== password.value && this.value.length > 0) {
            this.classList.add('error');
            confirmPasswordError.classList.add('visible');
        } else {
            this.classList.remove('error');
            confirmPasswordError.classList.remove('visible');
        }
    });

    // Проверка при отправке формы
    form.addEventListener('submit', function(e) {
        let isValid = true;

        // Проверка имени пользователя
        if (username.value.length < 5) {
            username.classList.add('error');
            usernameError.classList.add('visible');
            isValid = false;
        }

        // Проверка пароля
        if (password.value.length < 5) {
            password.classList.add('error');
            passwordError.classList.add('visible');
            isValid = false;
        }

        // Проверка совпадения паролей
        if (password.value !== confirmPassword.value) {
            confirmPassword.classList.add('error');
            confirmPasswordError.classList.add('visible');
            isValid = false;
        }

        if (!isValid) {
            e.preventDefault();
        }
    });

    // Убираем ошибку при вводе
    [username, password, confirmPassword].forEach(input => {
        input.addEventListener('input', function() {
            this.classList.remove('error');
            const errorId = this.id + 'Error';
            document.getElementById(errorId).classList.remove('visible');
        });
    });
</script>
</body>
</html>
